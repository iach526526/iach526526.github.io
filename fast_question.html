    <style>
        body{
            padding: 0;
            margin: 0;
            text-align: center;
            display: flex;

        }
        .content
        {
            display: flex;

            align-items: center;

            background-color: rgb(183, 183, 185);

        .timer{
            background-color: #eae0d0;
            height:200px;

            align-items: center; 
        }
        .countdownTitle{
            font-size: 80px;
            font-weight: 600;

            border-radius: 50%;
            padding: 20px 25px 20px 25px;
        }
        .selection-btns
        {
            margin-top: 15%;

        }

<body>
    <body>
        <div class="content">
            <div class="timer">
                    <div id="count_down_timer" class="countdownTitle"></div>
            </div>
            <div id="title"></div>
            <div class="selection-btns">
                <button type="button" class="btn btn-primary" id="btn1">123466</button>
                <button type="button" class="btn btn-danger" id="btn2">123466</button>
                <button type="button" class="btn btn-info"id="btn3">123466</button>
                <button type="button" class="btn btn-warning"id="btn4">123466</button>
            </div>
        </div>
        
        
</body>
<script>
    var question =new Array();
    question[0]=['問題1',"選項1","選項2","選項3","選項4",4];
    var timerVariable;
    function countDown(totalMilliseconds) {
        var interval = setInterval(function() {
            totalMilliseconds -= 10;
            var seconds = Math.floor(totalMilliseconds / 1000);
            var formattedTime = seconds.toString().padStart(2,'0');
            document.getElementById("count_down_timer").innerHTML = formattedTime;
            console.log(totalMilliseconds);
            
            if (totalMilliseconds <= 0) {
                clearInterval(interval);
                // alert('時間到');
                return;
            }
        }, 10);
    }
    for(var i = 0; i < question.length; i++)
    {
        countDown(30000);// 倒數(毫秒) 1000ms=1s
        $('#title')
    }
    
</script>
