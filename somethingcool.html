  <!-- 滾輪燈箱 -->
<script>
    const lightbox = document.querySelector('.lightbox');
    const lightboxContent = document.querySelector('.lightbox-content');
    let isScrolling = false;

    lightbox.addEventListener('wheel', handleLightboxScroll);

    function handleLightboxScroll(event) {
    event.preventDefault();

    if (!isScrolling) {
        isScrolling = true;
        const scrollDirection = event.deltaY > 0 ? 'right' : 'left';
        const scrollAmount = window.innerWidth;

        if (scrollDirection === 'right') {
        lightboxContent.scrollBy({
            left: scrollAmount,
            behavior: 'smooth'
        });
        } else {
        lightboxContent.scrollBy({
            left: -scrollAmount,
            behavior: 'smooth'
        });
        }

        setTimeout(() => {
        isScrolling = false;
        }, 500); // 設定一個延遲時間來避免連續滾動太快
    }
    }

</script>
